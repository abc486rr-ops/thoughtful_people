        action: "1907년 1월 29일, 일본이 강제로 빌려준 차관 1,300만 원을 국민의 힘으로 갚자는 국채보상운동을 발의했다. '2천만 동포가 3개월간 담배를 끊고 국채를 갚자'고 제안하며, 즉석에서 당시 거금인 800원을 기부했다. 이 운동은 전국으로 확산되어 남녀노소, 신분을 가리지 않고 기생·백정까지 참여하는 범국민 운동이 되었다. 2017년 유네스코 세계기록유산으로 등재되었다."
    },
    {
        name: "김순권", nameEn: "Kim Soon-kwon", years: "1945-", origin: "대한민국 울산", isDaegu: true,

        profile: "대한민국의 농학자이자 '옥수수 박사'로 불리는 육종학자. 가난한 어부의 아들로 태어나 배고픔 속에서 성장했다. 울산농고와 경북대 농학과를 거쳐 하와이대에서 농학박사 학위를 받았다. 1979년부터 17년간 나이지리아 국제열대농업연구소에서 아프리카 식량난 해결을 위해 헌신했으며, 5차례 노벨평화상 후보로 추천되었다.",
        action: "1979년 '5억 아프리카 인구의 식량난을 해결해달라'는 요청을 받고 즉시 아프리카로 건너가 17년간 연구에 매진했다. 아프리카에서 '악마의 풀'로 불리는 스트라이가에 강한 슈퍼옥수수를 개발하여 수많은 생명을 구했으며, 9차례 말라리아에 걸리면서도 연구를 멈추지 않았다. 100여 개의 신품종을 개발했으며, '노벨상보다 굶주린 사람이 줄어드는 게 더 중요하다'는 신념으로 평생을 살았다."

// ── 상태 ──
let cur = 0;
let autoTimer = null;
let touchX0 = 0, touchY0 = 0;

// ── 상단 상세 정보 교체 (애니메이션 포함) ──
function showDetail(i) {
    const p = people[i];
    const detail = document.getElementById('detail');

    // 페이드아웃
    detail.style.opacity = '0';
    detail.style.transform = 'translateY(8px)';

    setTimeout(() => {
        document.getElementById('dImg').src = p.image;
        document.getElementById('dImg').alt = p.name;
        document.getElementById('dName').textContent = `${p.name}  ${p.nameEn}`;
        document.getElementById('dYears').textContent = p.years;
        document.getElementById('dOrigin').textContent = p.origin;
        document.getElementById('dProfile').textContent = p.profile;
        document.getElementById('dAction').textContent = p.action;

        const quote = document.getElementById('dQuote');
        if (p.isDaegu) {
            detail.classList.add('daegu-panel');
            quote.textContent = '"대체로 평안하고, 구석구석 행복하시오."';
            quote.style.display = 'block';
        } else {
            detail.classList.remove('daegu-panel');
            quote.style.display = 'none';
        }

        // 페이드인
        detail.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
        detail.style.opacity = '1';
        detail.style.transform = 'translateY(0)';

        // 상단으로 스크롤
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 200);
}

const N = people.length;
let isSliding = false; // 슬라이드 중 중복 입력 방지

// ── 카드 HTML 생성 ──
function cardHTML(p, realIndex) {
    return `
        <div class="c-item" data-real="${realIndex}">
            <div class="c-card ${p.isDaegu ? 'daegu-bg' : ''}">
                <img class="c-img" src="${p.image}" alt="${p.name}" loading="lazy">
                <div class="c-name">${p.name}</div>
                <div class="c-sub">${p.nameEn}</div>
            </div>
        </div>`;
}

// ── 캐러셀 빌드 ──
// 구조: [...끝3장복제] [실제0~N-1] [앞3장복제...]
// 앞에 복제 3장 → 실제 트랙 시작 인덱스 = 3
const CLONE = 3; // 양쪽 복제 수
let trackCur = CLONE; // 현재 트랙 인덱스 (실제 인덱스 아님)

function buildCarousel() {
    const track = document.getElementById('cTrack');
    const dots  = document.getElementById('cDots');

    // 앞 복제: 마지막 CLONE장
    let html = '';
    for (let i = N - CLONE; i < N; i++) html += cardHTML(people[i], i);
    // 실제 카드
    for (let i = 0; i < N; i++)          html += cardHTML(people[i], i);
    // 뒤 복제: 처음 CLONE장
    for (let i = 0; i < CLONE; i++)      html += cardHTML(people[i], i);

    track.innerHTML = html;

    dots.innerHTML = people.map((_, i) =>
        `<button class="dot" id="dot-${i}" onclick="dotClick(${i})"></button>`
    ).join('');

    // 카드 클릭
    track.addEventListener('click', e => {
        const item = e.target.closest('.c-item');
        if (!item) return;
        const realIdx = parseInt(item.dataset.real);
        if (realIdx === cur) {
            showDetail(cur);
        } else {
            // 왼쪽 카드면 prev, 오른쪽 카드면 next
            const items = [...track.querySelectorAll('.c-item')];
            const clickedTIdx = items.indexOf(item);
            if (clickedTIdx < trackCur) { _slideDelta(-1); resetAuto(); }
            else                        { _slideDelta(1);  resetAuto(); }
        }
    });
}

// ── 오프셋 계산 ──
function getOffset(tIdx) {
    const clip  = document.getElementById('cClip');
    const itemW = document.querySelector('.c-item').offsetWidth;
    const clipW = clip.offsetWidth;
    return tIdx * itemW - clipW / 2 + itemW / 2;
}

// ── 트랜지션 없이 위치 설정 ──
function setPos(tIdx) {
    const track = document.getElementById('cTrack');
    track.style.transition = 'none';
    track.style.transform  = `translateX(${-getOffset(tIdx)}px)`;
}

function _slideDelta(delta) {
    const track = document.getElementById('cTrack');
    trackCur += delta;
    cur = ((trackCur - CLONE) % N + N) % N;

    track.style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
    track.style.transform  = `translateX(${-getOffset(trackCur)}px)`;

    updateActive();

    // 0.52초 후 (애니메이션 끝난 직후) 복제 구간이면 실제 위치로 순간이동
    setTimeout(() => {
        // 뒤 복제 구간에 들어왔으면 → 실제 앞쪽으로
        if (trackCur >= CLONE + N) {
            trackCur -= N;
            setPos(trackCur);
        }
        // 앞 복제 구간에 들어왔으면 → 실제 뒤쪽으로
        if (trackCur < CLONE) {
            trackCur += N;
            setPos(trackCur);
        }
        isSliding = false;
    }, 520);
}

// ── 점 클릭 ──
function dotClick(realIdx) {
    if (isSliding || realIdx === cur) return;
    // 가장 짧은 방향으로 이동
    let delta = realIdx - cur;
    if (delta > N / 2)  delta -= N;
    if (delta < -N / 2) delta += N;
    _slideDelta(delta > 0 ? 1 : -1);
    // 여러 칸이면 반복 (타이머)
    if (Math.abs(delta) > 1) {
        let steps = Math.abs(delta) - 1;
        const dir = delta > 0 ? 1 : -1;
        const iv = setInterval(() => {
            if (steps-- <= 0 || cur === realIdx) { clearInterval(iv); return; }
            if (!isSliding) _slideDelta(dir);
        }, 530);
    }
    resetAuto();
}

// ── 활성화 표시 업데이트 ──
function updateActive() {
    document.querySelectorAll('.c-item').forEach(item => {
        const isActive = parseInt(item.dataset.real) === cur;
        item.querySelector('.c-card').classList.toggle('is-active', isActive);
        item.querySelector('.c-card').classList.toggle('is-side',   !isActive);
    });
    people.forEach((_, i) => {
        document.getElementById(`dot-${i}`).classList.toggle('is-active', i === cur);
    });
}

// ── 화살표 ──
document.getElementById('cPrev').onclick = () => { _slideDelta(-1); resetAuto(); };
document.getElementById('cNext').onclick = () => { _slideDelta(1);  resetAuto(); };

// ── 자동 슬라이드 (10초) ──
function startAuto() {
    autoTimer = setInterval(() => _slideDelta(1), 10000);
}
function resetAuto() {
    clearInterval(autoTimer);
    startAuto();
}

// 호버 일시정지
const wrap = document.querySelector('.carousel-wrap');
wrap.addEventListener('mouseenter', () => clearInterval(autoTimer));
wrap.addEventListener('mouseleave', () => startAuto());

// ── 터치 스와이프 ──
const clip = document.getElementById('cClip');
clip.addEventListener('touchstart', e => {
    touchX0 = e.touches[0].clientX;
    touchY0 = e.touches[0].clientY;
}, { passive: true });
clip.addEventListener('touchend', e => {
    const dx = touchX0 - e.changedTouches[0].clientX;
    const dy = touchY0 - e.changedTouches[0].clientY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 36) {
        _slideDelta(dx > 0 ? 1 : -1);
        resetAuto();
    }
}, { passive: true });

// ── 키보드 ──
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  { _slideDelta(-1); resetAuto(); }
    if (e.key === 'ArrowRight') { _slideDelta(1);  resetAuto(); }
});

// ── 리사이즈 ──
window.addEventListener('resize', () => setPos(trackCur));

// ── 초기 실행 ──
window.addEventListener('load', () => {
    buildCarousel();
    cur = Math.floor(Math.random() * N);
    trackCur = CLONE + cur;
    setTimeout(() => {
        setPos(trackCur);
        updateActive();
        showDetail(cur);
        window.scrollTo({ top: 0 });
    }, 60);
    startAuto();
});
</script>
